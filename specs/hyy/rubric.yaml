version: 1
total: 100

gates:
  - id: trace_present
    type: required_fields
    description: "submission_trace must be provided with steps/cuts/cutflow."
    required_fields:
      - status
      - cuts
      - cutflow
    fail_total_score: 0

rule_checks:
  - id: cutflow_has_all_required_cuts
    type: check_cut_ids
    description: "Cutflow must contain all required cut IDs."
    points: 40
    required_cut_ids:
      - tight_id
      - pt_abs
      - calo_iso
      - eta_crack_veto
      - compute_myy
      - pt_rel_myy

  - id: fitted_mass_in_range
    type: numeric_in_range
    description: "Fitted signal mass must be consistent with Higgs mass (~125 GeV)."
    points: 30
    value_path: "fit_result.center"
    lo: 120.0
    hi: 130.0

# Future/LLM checks can be described here or in dimensions
llm_checks: 
  # Placeholder for dimensions if we want to enable them later
  []
