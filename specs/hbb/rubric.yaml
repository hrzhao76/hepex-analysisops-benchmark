version: 1
total: 100

gates:
  - id: trace_present
    type: required_fields
    required_fields: ["status", "cuts", "fit_method"]
    fail_total_score: 0

rule_checks:
  - id: check_cuts
    type: check_cut_ids
    points: 40
    required_cut_ids:
      - "met_trigger"
      - "met_150"
      - "zero_lep"
      - "2_bjets"
      - "dphi_bb"
      - "dphi_met_bb"

  - id: check_mass
    type: numeric_in_range
    points: 10
    value_path: "fit_result.center"
    lo: 110.0
    hi: 140.0
    # Soften points because b-jet mass reconstruction is hard without corrections

  - id: check_method_metadata
    type: required_keys_in_dict
    points: 10
    dict_path: "fit_method"
    required_keys_path: "fit_expectations.method_required_fields"

llm_checks:
  - id: method_reasoning
    type: llm_reasoning
    points: 40
    output_key: "dimension_scores.method_reasoning"
    clamp: [0, 40]
    confidence_key: "confidence"
